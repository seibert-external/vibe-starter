name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  # Respond to @claude mentions in comments and issues
  claude-assist:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    uses: seibert-external/vibe-ci/.github/workflows/claude-assist.yml@main
    secrets: inherit

  # Automated PR review on open
  claude-review:
    if: ${{ github.event_name == 'pull_request' && github.actor != 'renovate[bot]' }}
    uses: seibert-external/vibe-ci/.github/workflows/claude-review.yml@main
    secrets: inherit
