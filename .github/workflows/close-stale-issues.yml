name: Close stale issues

on:
  schedule:
    - cron: "30 * * * *" # every hour at :30
  workflow_dispatch:

permissions:
  issues: write

jobs:
  close-stale:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const STALE_DAYS = 7;
            const cutoff = new Date(Date.now() - STALE_DAYS * 24 * 60 * 60 * 1000);

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: "open",
              labels: "awaiting-response",
              sort: "updated",
              direction: "asc",
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const updatedAt = new Date(issue.updated_at);
              if (updatedAt >= cutoff) continue;

              const creator = issue.user.login;

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: [
                  `@${creator} This issue has been waiting for a response for more than ${STALE_DAYS} days and was closed automatically.`,
                  "",
                  "Feel free to reopen it with the requested information whenever you're ready.",
                ].join("\n"),
              });

              await github.rest.issues.update({
                ...context.repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "not_planned",
              });

              core.info(`Closed issue #${issue.number} (last updated ${updatedAt.toISOString()})`);
            }
