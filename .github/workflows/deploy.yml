name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy:
    uses: seibert-external/vibe-ci/.github/workflows/coolify-deploy.yml@main
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    with:
      coolify_app_uuid: ${{ vars.COOLIFY_APP_UUID }}
      event_name: ${{ github.event_name }}
      pr_number: ${{ github.event.pull_request.number || 0 }}
      pr_action: ${{ github.event.action || '' }}
      pr_head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit
