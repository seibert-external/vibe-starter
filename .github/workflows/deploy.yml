name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  COOLIFY_API_URL: https://app.coolify.io/api/v1

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: deploy
    steps:
      - name: Resolve deployment context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=preview" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const target = '${{ steps.ctx.outputs.target }}';
            const isProduction = target === 'production';
            const environment = isProduction
              ? 'production'
              : `preview (pr-${{ steps.ctx.outputs.pr_number }})`;

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ steps.ctx.outputs.sha }}',
              environment,
              auto_merge: false,
              required_contexts: [],
              transient_environment: !isProduction,
              production_environment: isProduction,
              description: `Coolify ${target} deployment`,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              description: 'Waiting for Coolify deployment',
            });

            return deployment.data.id;
          result-encoding: string

      - name: Trigger Coolify deployment (production only)
        if: steps.ctx.outputs.target == 'production'
        run: |
          uuid="${{ secrets.COOLIFY_APP_UUID }}"
          token="${{ secrets.COOLIFY_API_TOKEN }}"
          echo "Triggering production deployment..."
          curl -sf "${COOLIFY_API_URL}/deploy?uuid=${uuid}&force=true" \
            -H "Authorization: Bearer ${token}"

      - name: Comment deploying status
        if: steps.ctx.outputs.target == 'preview'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.ctx.outputs.pr_number }};
            const previewUrl = `http://${prNumber}.dkokcgwgkk44g0ks0w8wg48k.178.104.13.246.sslip.io`;
            const sha = '${{ steps.ctx.outputs.sha }}'.slice(0, 7);
            const now = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
            const marker = `<!-- coolify:preview -->`;

            const body = [
              marker,
              `⏳ **Deploying** preview...`,
              `🔗 ${previewUrl}`,
              '',
              `<sub>${sha} · ${now}</sub>`,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Wait for Coolify deployment and poll status
        id: poll
        run: |
          uuid="${{ secrets.COOLIFY_APP_UUID }}"
          token="${{ secrets.COOLIFY_API_TOKEN }}"
          commit="${{ steps.ctx.outputs.sha }}"

          echo "Waiting for Coolify deployment for commit ${commit}..."
          elapsed=0
          timeout=300
          deployment_uuid=""

          # Phase 1: Find the deployment for this commit
          # The API may return an array or a paginated object with a data key
          while [ $elapsed -lt $timeout ] && [ -z "$deployment_uuid" ]; do
            response=$(curl -sf "${COOLIFY_API_URL}/deployments/applications/${uuid}?skip=0&take=5" \
              -H "Authorization: Bearer ${token}")
            deployment_uuid=$(echo "$response" \
              | jq -r --arg commit "$commit" '
                .deployments
                | [.[] | select(.commit == $commit)][0].deployment_uuid // empty')

            if [ -n "$deployment_uuid" ]; then
              echo "Found deployment: ${deployment_uuid}"
              break
            fi

            echo "[${elapsed}s] Deployment not found yet, waiting..."
            sleep 10
            elapsed=$((elapsed + 10))
          done

          if [ -z "$deployment_uuid" ]; then
            echo "No deployment found for commit ${commit} after ${timeout}s"
            echo "status=unknown" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Phase 2: Poll deployment status
          while [ $elapsed -lt $timeout ]; do
            status=$(curl -sf "${COOLIFY_API_URL}/deployments/${deployment_uuid}" \
              -H "Authorization: Bearer ${token}" \
              | jq -r '.status // "unknown"')

            echo "[${elapsed}s] Status: ${status}"

            case "$status" in
              finished)
                echo "status=success" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              failed|cancelled*|error)
                echo "status=failure" >> "$GITHUB_OUTPUT"
                exit 1
                ;;
            esac

            sleep 10
            elapsed=$((elapsed + 10))
          done

          echo "Timed out after ${timeout}s"
          echo "status=timeout" >> "$GITHUB_OUTPUT"
          exit 1
        timeout-minutes: 6

      - name: Comment final status
        if: always() && steps.ctx.outputs.target == 'preview'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.ctx.outputs.pr_number }};
            const previewUrl = `http://${prNumber}.dkokcgwgkk44g0ks0w8wg48k.178.104.13.246.sslip.io`;
            const sha = '${{ steps.ctx.outputs.sha }}'.slice(0, 7);
            const now = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
            const marker = `<!-- coolify:preview -->`;
            const status = '${{ steps.poll.outputs.status }}';

            let icon, label;
            if (status === 'success') {
              icon = '✅';
              label = 'Live';
            } else if (status === 'timeout') {
              icon = '⏰';
              label = 'Timed out';
            } else {
              icon = '❌';
              label = 'Failed';
            }

            const body = [
              marker,
              `${icon} **${label}:** ${previewUrl}`,
              status === 'success' ? '🗄️ Isolated preview database (branch-specific)' : '',
              '',
              `<sub>${sha} · ${now}</sub>`,
            ].filter(Boolean).join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Update GitHub deployment status
        if: always() && steps.deployment.outputs.result
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = parseInt('${{ steps.deployment.outputs.result }}', 10);
            const pollStatus = '${{ steps.poll.outputs.status }}';
            const target = '${{ steps.ctx.outputs.target }}';
            const isProduction = target === 'production';

            const stateMap = {
              success: 'success',
              failure: 'failure',
              timeout: 'error',
              unknown: 'error',
            };
            const state = stateMap[pollStatus] || 'error';

            const environmentUrl = isProduction
              ? undefined
              : `http://${{ steps.ctx.outputs.pr_number }}.dkokcgwgkk44g0ks0w8wg48k.178.104.13.246.sslip.io`;

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state,
              environment_url: environmentUrl,
              description: state === 'success'
                ? 'Deployment live'
                : `Deployment ${pollStatus}`,
            });
