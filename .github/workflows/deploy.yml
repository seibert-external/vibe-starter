name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  deploy:
    uses: seibert-external/vibe-ci/.github/workflows/coolify-deploy.yml@main
    permissions:
      contents: read
    with:
      coolify_app_uuid: ${{ vars.COOLIFY_APP_UUID }}
      commit_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      pr_number: ${{ github.event.pull_request.number || 0 }}
    secrets: inherit
