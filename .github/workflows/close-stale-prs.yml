name: Close stale PRs

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

jobs:
  close-stale:
    runs-on: ubuntu-22.04
    steps:
      - name: Close inactive non-Renovate PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const STALE_DAYS = 7;
            const cutoff = new Date(Date.now() - STALE_DAYS * 24 * 60 * 60 * 1000);

            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              sort: "updated",
              direction: "asc",
            });

            for (const pr of prs) {
              if (pr.user.login === "renovate[bot]") continue;

              const updatedAt = new Date(pr.updated_at);
              if (updatedAt >= cutoff) continue;

              const creator = pr.user.login;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  `@${creator} This PR has been inactive for more than ${STALE_DAYS} days and was closed automatically.`,
                  "",
                  "Feel free to reopen it whenever you're ready to continue working on it.",
                ].join("\n"),
              });

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: "closed",
              });

              core.info(`Closed PR #${pr.number} (last updated ${updatedAt.toISOString()})`);
            }
