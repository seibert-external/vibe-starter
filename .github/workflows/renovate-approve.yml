name: Auto-approve Renovate PRs

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-22.04
    if: github.actor == 'renovate[bot]'
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
