services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  e2e:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile
      args:
        NPM_TOKEN: ${NPM_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./playwright-report:/app/tests/e2e/playwright-report
      - ./test-results:/app/tests/e2e/test-results
